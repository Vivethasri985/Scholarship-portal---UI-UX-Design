<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complete Sign-Up</title>
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>

<div class="top-bar">
    <h1>Amrita Vishwa Vidyapeetham</h1>
    <img src="amrita-logo.png" alt="Amrita Logo">
</div>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Complete Sign-Up</h2>

        <form id="signupStepTwoForm">
            <label>Enter OTP</label>
            <input type="text" id="signupOtp" placeholder="Enter OTP" required>

            <label>Username</label>
            <input type="text" id="signupUsername" placeholder="Minimum 6 characters" required>

            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Strong password" required>

            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Re-enter password" required>

            <button type="submit" class="main-btn">Create Account</button>
        </form>

        <p class="bottom-link">
            Already have an account? <a href="login.html">Login</a>
        </p>
    </div>
</div>

<script src="signup-step2.js"></script>
</body>
</html>
