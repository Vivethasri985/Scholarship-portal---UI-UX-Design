<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign-Up</title>
    <link rel="stylesheet" href="../css/auth-style.css">
</head>
<body>

<div class="top-bar">
    <h1>Amrita Vishwa Vidyapeetham</h1>
    <img src="../assets/images/amrita-logo.png" alt="Amrita Logo">
</div>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Sign-Up</h2>

        <form id="signupStepOneForm">

            <label>Sign-Up Method</label>

            <div class="radio-set">
                <input type="radio" name="signupMethod" value="email" onclick="toggleSignup('email')" required> Email
                <input type="radio" name="signupMethod" value="phone" onclick="toggleSignup('phone')"> Phone Number
            </div>

            <label>Email ID</label>
            <input type="text" id="signupEmail" placeholder="Enter email address" disabled>

            <label>Phone Number</label>
            <input type="text" id="signupPhone" placeholder="Enter 10-digit phone number" disabled>
            <button type="button" class="secondary-btn" id="sendOtpBtn">Send OTP</button>
        </form>

        <p class="bottom-link">
            Already have an account? <a href="login.html">Login</a>
        </p>
    </div>
</div>

<script>
function toggleSignup(type){

    let emailField = document.getElementById("signupEmail");
    let phoneField = document.getElementById("signupPhone");

    if(type === "email"){
        emailField.disabled = false;
        phoneField.disabled = true;
        phoneField.value = "";
    }

    if(type === "phone"){
        phoneField.disabled = false;
        emailField.disabled = true;
        emailField.value = "";
    }
}
</script>

<script src="../js/signup-step1.js"></script>
</body>
</html>
