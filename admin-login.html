<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>

<div class="top-bar">
    <h1>Amrita Vishwa Vidyapeetham</h1>
    <img src="amrita-logo.png" alt="Amrita Logo">
</div>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Admin Login</h2>

        <form id="adminLoginForm">
            <label>Admin Username</label>
            <input type="text" id="adminUsername" placeholder="Enter admin username" required>

            <label>Password</label>
            <input type="password" id="adminPassword" placeholder="Enter password" required>

            <button type="submit" class="main-btn">Login</button>
        </form>

        <p class="bottom-link">
            <a href="index.html">Back to Portal</a>
        </p>
    </div>
</div>

<script>
document.getElementById("adminLoginForm").addEventListener("submit", function (e) {
    e.preventDefault();

    let username = document.getElementById("adminUsername").value.trim();
    let password = document.getElementById("adminPassword").value.trim();

    if (username === "admin" && password === "Admin@123") {
        window.location.href = "admin-dashboard.html";
    } else {
        alert("Invalid admin credentials.");
    }
});
</script>

</body>
</html>
